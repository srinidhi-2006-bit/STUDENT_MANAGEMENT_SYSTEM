<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Students - Student Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html" id="dashboard">Dashboard</a>
        <a href="add_students.html" id="addStudent">Add Students</a>
        <a href="view_students.html" id="viewStudent">View Students</a>
        <a href="logout.html" id="logout">Logout</a>
    </nav>
    <div class="content">
        <h1>Add Student to Student Management System</h1>
        <form id="addStudentForm" action="view_students.html">
            <label for="rollNo">Roll No:</label>
            <input type="text" id="rollNo" name="rollNo" required><br><br>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch" required><br><br>
            <label for="cgpa">CGPA:</label>
            <input type="number" step="0.01" id="cgpa" name="cgpa" required><br><br>
            <button type="submit">Add Student</button>
        </form>
    </div>
</body>
</html>
