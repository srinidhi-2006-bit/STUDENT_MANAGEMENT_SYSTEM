<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Management System</title>
</head>
<body>
    <div class="navbar">
        <a href="dashboard.html" id="dashboard">Dashboard</a>
        <a href="add_students.html" id="addStudent">Add Students</a>
        <a href="view_students.html" id="viewStudent">View Students</a>
        <a href="logout.html" id="logout">Logout</a>
    </div>
    <div class="content">
        <h1>Edit Student in Student Management System</h1>
        <form id="editStudentForm" action="view_students.html" method="GET">
            <label for="rollNo">Roll No:</label>
            <input type="text" id="rollNo" name="rollNo" value="1" required><br><br>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="Nidhi" required><br><br>
            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch" value="Computer Science" required><br><br>
            <label for="cgpa">CGPA:</label>
            <input type="number" step="0.01" id="cgpa" name="cgpa" value="9.3" required><br><br>
            <button type="submit">Update Student</button>
        </form>
    </div>
</body>
</html>
